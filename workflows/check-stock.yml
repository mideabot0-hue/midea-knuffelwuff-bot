name: Midea und Knuffelwuff prüfen

on:
  workflow_dispatch:
  schedule:
    # Alle 15 Minuten; bewusst nicht genau zur vollen Stunde.
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: read

concurrency:
  group: midea-knuffelwuff-stock-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Letzten Produktstatus wiederherstellen
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: stock-state-v2-${{ github.run_id }}
          restore-keys: |
            stock-state-v2-

      - name: Playwright-Browser zwischenspeichern
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Python-Pakete installieren
        run: python -m pip install -r requirements.txt

      - name: Chromium installieren
        run: python -m playwright install --with-deps chromium

      - name: Verfügbarkeit prüfen und gegebenenfalls mailen
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_STARTTLS: ${{ secrets.SMTP_STARTTLS }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
        run: python bot.py --once

      - name: Neuen Produktstatus speichern
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: stock-state-v2-${{ github.run_id }}
