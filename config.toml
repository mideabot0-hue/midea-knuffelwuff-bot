# Knuffelwuff: vollständige Sortimentsüberwachung über die Hauptkategorien.
# Beim ersten Lauf wird nur ein Ausgangsbestand gespeichert. Danach kommen
# E-Mails bei neuen lieferbaren Artikeln und bei wieder lieferbaren Artikeln.
[[catalogs]]
name = "Knuffelwuff Gesamtsortiment"
retailer = "Knuffelwuff"
enabled = true
max_pages_per_category = 5
urls = [
  "https://www.knuffelwuff.de/Schlafplatz",
  "https://www.knuffelwuff.de/Reise-Transport",
  "https://www.knuffelwuff.de/Hundefutter",
  "https://www.knuffelwuff.de/Bekleidung",
  "https://www.knuffelwuff.de/Leinen-Halsbaender",
  "https://www.knuffelwuff.de/Spielzeug",
  "https://www.knuffelwuff.de/Outlet",
]
available_phrases = ["Sofort verfügbar", "Sofort lieferbar", "Auf Lager", "Lieferbar"]
unavailable_phrases = ["Nicht verfügbar", "Derzeit nicht verfügbar", "Nicht lieferbar", "Ausverkauft"]
