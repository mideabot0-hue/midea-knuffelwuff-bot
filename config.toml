[settings]
check_interval_minutes = 15
timeout_seconds = 35
seconds_between_checks = 4
catalog_seconds_between_pages = 1.5
# 0 = nur bei Wechsel von nicht verfügbar zu verfügbar.
# 24 = zusätzlich höchstens einmal pro 24 Stunden erinnern, solange verfügbar.
notification_cooldown_hours = 24

[[products]]
name = "Midea PortaSplit 12.000 BTU"
retailer = "OBI"
url = "https://www.obi.de/p/8620890/midea-mobile-split-klimaanlage-portasplit"
enabled = true
available_phrases = ["Online verfügbar", "Lieferung nach Hause", "In den Warenkorb"]
unavailable_phrases = ["Online nicht verfügbar", "Derzeit nicht verfügbar"]
buy_selectors = ["button:has-text('In den Warenkorb')", "button:has-text('Jetzt kaufen')"]
availability_selectors = ["main", "[data-testid*='availability']"]

